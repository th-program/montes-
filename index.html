<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Montes Developers | Soluções Digitais</title>
    <style>
:root {
            --bg-dark: #050b14;
            --bg-card: #0f1626;
            --primary-cyan: #00d4ff;
            --primary-blue: #3b82f6;
            --text-light: #e2e8f0;
            --text-muted: #94a3b8;
            --border-color: #1e293b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            scroll-behavior: smooth;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-light);
            line-height: 1.6;
            overflow-x: hidden;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        header {
            background-color: rgba(5, 11, 20, 0.95);
            padding: 1rem 5%;
            position: fixed;
            width: 100%;
            top: 0;
            z-index: 1000;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
            backdrop-filter: blur(10px);
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .logo-text {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--text-light);
            letter-spacing: 1px;
        }

        .logo-text span { color: var(--primary-cyan); }

        nav ul {
            list-style: none;
            display: flex;
            gap: 2rem;
        }

        nav ul li a {
            font-weight: 500;
            font-size: 0.95rem;
            text-transform: uppercase;
            transition: color 0.3s ease;
        }

        nav ul li a:hover { color: var(--primary-cyan); }

        .menu-toggle {
            display: none;
            font-size: 1.5rem;
            cursor: pointer;
            color: var(--primary-cyan);
        }

        /* --- CORREÇÃO DEFINITIVA DO BANNER --- */
        section.hero-banner {
            margin-top: 72px; /* Altura do header */
            padding: 0;
            width: 100%;
            background-color: var(--bg-dark);
            overflow: hidden;
        }

        /* O elemento picture precisa ser block para não criar espaços vazios */
        .hero-banner picture {
            display: block;
            width: 100%;
        }

        .hero-img {
            width: 100%;
            height: auto; /* Deixa a altura ser definida pela proporção da imagem */
            display: block;
            object-fit: contain; /* Garante que a imagem inteira apareça sem cortes */
            margin: 0 auto;
        }

        .hero-overlay {
            width: 100%;
            padding: 3rem 5%;
            display: flex;
            justify-content: center;
            background-color: var(--bg-dark);
        }

        /* Botão principal */
        .btn-chamativo {
            display: inline-block;
            width: 100%;
            max-width: 400px;
            background: linear-gradient(90deg, var(--primary-blue), var(--primary-cyan));
            color: #ffffff;
            padding: 1.2rem;
            border-radius: 8px;
            font-size: 1.1rem;
            font-weight: 800;
            text-transform: uppercase;
            text-align: center;
            box-shadow: 0 4px 15px rgba(0, 212, 255, 0.4);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0.7); }
            70% { transform: scale(1.03); box-shadow: 0 0 0 15px rgba(0, 212, 255, 0); }
            100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(0, 212, 255, 0); }
        }

        /* --- RESTANTE DAS SEÇÕES (Mantidas) --- */
        section { padding: 5rem 5%; }

        .section-title {
            text-align: center;
            font-size: 2rem;
            margin-bottom: 1rem;
            text-transform: uppercase;
        }

        .section-title span { color: var(--primary-cyan); }

        .section-subtitle {
            text-align: center;
            color: var(--text-muted);
            margin-bottom: 3rem;
        }

        .services-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 2rem;
            max-width: 1200px;
            margin: 0 auto;
        }

        .service-card {
            background-color: var(--bg-card);
            padding: 2rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            text-align: center;
        }

        .systems-container {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .system-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 1.5rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .system-icon {
            background: linear-gradient(135deg, var(--primary-blue), var(--primary-cyan));
            width: 50px; height: 50px;
            border-radius: 10px;
            display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: white; flex-shrink: 0;
        }

        /* Contato Atendentes */
        .whatsapp-options {
            display: flex;
            justify-content: center;
            gap: 2rem;
            flex-wrap: wrap;
            margin-top: 2rem;
        }

        .attendant-card {
            background-color: var(--bg-card);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            width: 300px;
            text-align: center;
            transition: 0.3s;
        }

        .attendant-card:hover { border-color: #25D366; transform: translateY(-5px); }

        .btn-whatsapp {
            display: block;
            background-color: #25D366;
            color: #fff;
            padding: 0.8rem;
            border-radius: 50px;
            font-weight: bold;
            animation: bounce 2s infinite;
        }

        @keyframes bounce {
            0%, 20%, 50%, 80%, 100% {transform: translateY(0);}
            40% {transform: translateY(-10px);}
            60% {transform: translateY(-5px);}
        }

        @media (max-width: 768px) {
            .menu-toggle { display: block; }
            nav ul {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%; left: 0; width: 100%;
                background: var(--bg-dark);
                padding: 1rem 0;
            }
            nav ul.active { display: flex; }
        }

        footer { text-align: center; padding: 2rem; color: var(--text-muted); }
</head>
<body>

    <header>
        <div class="logo-container">
            <img src="logomontes.png" alt="Logo Montes Developers" class="logo-img" onerror="this.style.display='none'">
            <div class="logo-text">Montes<span>DEV</span></div>
        </div>
        <div class="menu-toggle" onclick="toggleMenu()">☰</div>
        <nav>
            <ul id="nav-menu">
                <li><a href="#inicio" onclick="toggleMenu()">Início</a></li>
                <li><a href="#sobre" onclick="toggleMenu()">Sobre</a></li>
                <li><a href="#sistemas" onclick="toggleMenu()">Sistemas</a></li>
                <li><a href="#contato" onclick="toggleMenu()">Contato</a></li>
            </ul>
        </nav>
    </header>

   <section id="inicio" class="hero-banner">
        <picture>
            <source srcset="pes.jpeg" media="(max-width: 768px)">
            <img src="pe.jpeg" alt="Montes Developers" class="hero-img">
        </picture>
        
        <div class="hero-overlay">
            <a href="#sistemas" class="btn-chamativo">Conhecer Sistemas</a>
        </div>
    </section>

    <section id="sobre">
        <h2 class="section-title">Soluções <span>Digitais</span></h2>
        <p class="section-subtitle">Web design & desenvolvimento profissional</p>
        
        <div class="services-grid">
            <div class="service-card">
                <h3>Criação de Sites e Sistemas</h3>
                <p>Desenvolvemos interfaces sob medida para o seu negócio, garantindo uma presença digital forte e profissional.</p>
            </div>
            <div class="service-card">
                <h3>Foco em Performance</h3>
                <p>Código otimizado e fluido. Entregamos resultados rápidos para a melhor experiência do seu usuário.</p>
            </div>
            <div class="service-card">
                <h3>Design Moderno</h3>
                <p>Interfaces atraentes, responsivas (celular e PC) e alinhadas com as tendências atuais de UX/UI.</p>
            </div>
        </div>
    </section>

    <section id="sistemas">
        <h2 class="section-title">Guia de <span>Sistemas</span></h2>
        <p class="section-subtitle">Painel Administrativo e de Testes</p>
        
        <div class="systems-container">
            <div class="system-card">
                <div class="system-icon">🔒</div>
                <div class="system-info">
                    <h3>Sistema de Login & Cadastro</h3>
                    <p>Acesso seguro de contas, validação de usuários e registro de novos clientes na plataforma.</p>
                </div>
            </div>

            <div class="system-card">
                <div class="system-icon">⚙️</div>
                <div class="system-info">
                    <h3>Painel de Mecânica</h3>
                    <p>Sistema focado para gestão automotiva, otimizando o controle interno de clientes e serviços.</p>
                </div>
            </div>

            <div class="system-card">
                <div class="system-icon">🔍</div>
                <div class="system-info">
                    <h3>Sistema de Consulta</h3>
                    <p>Mecanismo eficiente para busca e manipulação de dados já integrados ao banco.</p>
                </div>
            </div>
        </div>

        <div class="systems-action">
            <a href="sistemas.html" class="btn">Acessar Plataforma de Testes</a>
        </div>
    </section>

    <section id="contato">
        <h2 class="section-title">Faça um <span>Orçamento</span></h2>
        <div class="contact-container">
            <p>Excelência em desenvolvimento web. Escolha abaixo com quem deseja falar e entre em contato para um orçamento personalizado.</p>
            
            <div class="whatsapp-options">
                <div class="attendant-card">
                    <div class="avatar-placeholder">👨‍💻</div>
                    <h3>Saulo</h3>
                    <p>Especialista de Vendas</p>
                    <a href="https://wa.me/SEU_NUMERO_SAULO_AQUI" target="_blank" class="btn-whatsapp">Falar com Saulo</a>
                </div>

                <div class="attendant-card">
                    <div class="avatar-placeholder">👨‍💻</div>
                    <h3>Arthur</h3>
                    <p>Suporte e Orçamentos</p>
                    <a href="https://wa.me/SEU_NUMERO_ARTHUR_AQUI" target="_blank" class="btn-whatsapp">Falar com Arthur</a>
                </div>
            </div>

        </div>
    </section>

    <footer>
        <p>&copy; 2026 Montes Developers. Todos os direitos reservados.</p>
    </footer>

    <script>
        function toggleMenu() {
            if(window.innerWidth <= 768) {
                const menu = document.getElementById('nav-menu');
                menu.classList.toggle('active');
            }
        }
    </script>
</body>
</html>
