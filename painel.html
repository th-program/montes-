<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta id="viewport-meta" name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Mecânica Lima Car | Central do Proprietário</title>
    <style>
        :root { 
            --bg: #000814;
            --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #d4af37; 
            --primary-glow: rgba(212, 175, 55, 0.3);
            --text-main: #f8f9fa; 
            --text-dim: #94a3b8;
            --border: rgba(212, 175, 55, 0.15); 
            --success: #10b981; 
            --warning: #f59e0b; 
            --danger: #ef4444; 
            --input-bg: #001226; 
            --logo-size: 200px; 
            --radius: 16px;
        } 
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        
        body { 
            font-family: 'Inter', 'Segoe UI', Roboto, sans-serif;
            background-color: var(--bg); 
            background-image: 
                radial-gradient(circle at 10% 10%, rgba(212, 175, 55, 0.03) 0%, transparent 30%),
                radial-gradient(circle at 90% 90%, rgba(212, 175, 55, 0.03) 0%, transparent 30%);
            color: var(--text-main); 
            display: flex;
            flex-direction: column;
            min-height: 100vh; 
            padding: 10px;
            overflow-x: hidden;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .animar-entrada {
            animation: slideIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .badge-modo {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 6px;
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .modo-novo { background: rgba(16, 185, 129, 0.15); color: var(--success); border: 1px solid var(--success); }
        .modo-edicao { background: rgba(212, 175, 55, 0.15); color: var(--primary); border: 1px solid var(--primary); }

        @media (min-width: 768px) {
            body { padding: 25px; justify-content: center; }
        }

        .btn-home-fixed {
            display: inline-flex; align-items: center; gap: 8px; background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px); border: 1px solid var(--border); color: var(--text-main);
            padding: 10px 18px; border-radius: 50px; text-decoration: none; font-size: 12px;
            font-weight: 600; margin-bottom: 20px; transition: all 0.3s ease; width: fit-content;
        }

        @media (min-width: 768px) {
            .btn-home-fixed { position: fixed; top: 25px; left: 25px; margin-bottom: 0; z-index: 1000; }
        }

        .container { width: 100%; max-width: 100%; margin: 0 auto; flex: 1; display: flex; flex-direction: column; justify-content: center; transition: max-width 0.4s ease; } 

        @media (min-width: 768px) { 
            .container { max-width: 450px; } 
            .container:has(#view-painel:not(.hidden)) { max-width: 95vw; }
            #view-painel.card { width: 100% !important; min-height: 85vh; display: flex; flex-direction: column; }
        }

        section { display: block; animation: fadeIn 0.5s ease; width: 100%; } 
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } } 
        
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 20px; 
            border-radius: var(--radius); position: relative; width: 100%; backdrop-filter: blur(12px);
            box-shadow: 0 15px 35px rgba(0,0,0,0.4); margin: 0 auto;
        } 

        .logo-box { text-align: center; margin-bottom: 30px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); height: auto; display: block; margin: 0 auto; filter: drop-shadow(0 0 10px var(--primary-glow)); } 
        
        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; opacity: 0.9; } 
        input, textarea, select { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px !important; margin-bottom: 15px; transition: 0.3s; } 
        
        .btn-upload-custom { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(212, 175, 55, 0.05); border: 2px dashed var(--border); color: var(--primary); padding: 25px 15px; border-radius: var(--radius); cursor: pointer; margin-bottom: 20px; font-weight: 600; font-size: 12px; transition: 0.3s; width: 100%; } 
        .input-placa-grande { font-family: 'Monaco', monospace; font-size: 32px !important; background: linear-gradient(to bottom, #fff, #cbd5e1) !important; color: #0f172a !important; border: none !important; text-transform: uppercase; letter-spacing: 4px; text-align: center; border-radius: 12px !important; font-weight: 900; } 
        
        .btn-main { background: linear-gradient(135deg, #d4af37 0%, #b8962d 100%); color: #000; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; font-size: 13px; transition: 0.3s; box-shadow: 0 5px 15px rgba(184, 150, 45, 0.2); margin-top: 5px; display: block; text-decoration: none; text-align: center; } 
        .btn-main:active { transform: scale(0.98); }

        .categorias-filtro { display: flex; gap: 8px; margin-top: 10px; overflow-x: auto; padding-bottom: 12px; width: 100%; scrollbar-width: none; } 
        .cat-btn { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--text-dim); padding: 10px 16px; border-radius: 100px; font-size: 11px; font-weight: 600; cursor: pointer; white-space: nowrap; } 
        .cat-btn.active { border-color: var(--primary); color: #000; background: var(--primary); } 

        .status-picker { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; } 
        .status-option { background: rgba(255,255,255,0.03); border: 1px solid var(--border); padding: 12px 4px; border-radius: 10px; text-align: center; font-size: 9px; font-weight: 700; cursor: pointer; color: var(--text-dim); text-transform: uppercase; } 
        .status-option.active { border-color: var(--primary); color: var(--primary); background: rgba(212, 175, 55, 0.1); }

        .table-container { margin-top: 15px; background: rgba(0,0,0,0.2); border-radius: 14px; border: 1px solid var(--border); overflow-x: auto; max-height: 400px; } 
        table { width: 100%; border-collapse: collapse; min-width: 280px; }
        td { padding: 14px 10px; border-bottom: 1px solid var(--border); font-size: 13px; } 
        
        .hidden { display: none !important; } 
        #img-modal { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.95); z-index: 99999; display: none; justify-content: center; align-items: center; backdrop-filter: blur(10px); } 
        #modal-view { max-width: 95%; max-height: 80%; border: 1px solid var(--primary); border-radius: 10px; } 

        .fotos-grid { display: grid; gap: 8px; margin-top: 15px; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); } 
        .img-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); cursor: zoom-in;} 

        .confirm-box { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); display: none; justify-content: center; align-items: center; z-index: 10001; backdrop-filter: blur(8px); }
        .confirm-box .card { background: #070b14; border: 1px solid var(--border); padding: 30px; border-radius: 20px; border-top: 4px solid var(--danger); max-width: 320px; text-align: center;}

        .solicitacao-item { background: linear-gradient(145deg, rgba(212, 175, 55, 0.06), rgba(0,0,0,0)); border: 1px solid var(--border); padding: 15px; border-radius: 14px; margin-bottom: 12px; position: relative; }
        .solicitacao-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
        .solicitacao-badge { background: var(--input-bg); padding: 3px 8px; border-radius: 6px; font-size: 9px; color: var(--primary); font-weight: 800; border: 1px solid var(--border); }
        .solicitacao-info b { color: var(--text-main); font-size: 14px; text-transform: uppercase; }
        .solicitacao-info span { color: var(--primary); font-size: 11px; font-weight: 700; display: block; margin-top: 2px; }

        .relatorio-cliente-box { background: rgba(212, 175, 55, 0.03); padding: 15px; border-radius: 12px; border-left: 3px solid var(--primary); margin-bottom: 20px; }
        .painel-grid { display: flex; flex-direction: column; gap: 20px; width: 100%; flex: 1; } 
        
        @media (min-width: 992px) { 
            .painel-grid { flex-direction: row; align-items: stretch; } 
            .painel-col { flex: 1; height: 100%; display: flex; flex-direction: column; } 
            .painel-col:first-child { flex: 1.2; }
        } 
        
        .whatsapp-float-btn { background: #128c7e !important; color: white !important; display: flex; align-items: center; justify-content: center; gap: 8px; margin-bottom: 20px; border: none; padding: 14px; }
        .tag-servico { font-size: 10px; background: rgba(255,255,255,0.05); padding: 6px 12px; border-radius: 100px; cursor: pointer; border: 1px solid var(--border); color: var(--text-dim); font-weight: 600; }
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 20px; border-radius: 10px; background: #1e293b; color: white; border-left: 4px solid var(--primary); font-size: 13px; font-weight: 600; display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 85%; max-width: 400px; text-align: center; }
        
        .btn-danger-outline { background: none; border: 1px solid var(--danger); color: var(--danger); padding: 12px; border-radius: 12px; font-weight: 800; font-size: 11px; cursor: pointer; width: 100%; margin-top: 15px; transition: 0.3s; }
        .btn-danger-outline:hover { background: var(--danger); color: white; }

        /* NOVAS CLASSES PARA O PAINEL DO CLIENTE */
        .painel-proprietario {
            margin-top:20px; background:var(--card-bg); padding:20px; 
            border-radius:16px; border:1px solid var(--border); 
            animation: slideIn 0.4s ease;
        }
        .header-veiculo {
            display:flex; justify-content:space-between; align-items:center; margin-bottom:20px;
        }
        .header-veiculo h3 { color:var(--primary); text-transform:uppercase; font-size:18px; margin:0;}
        .placa-badge-cliente {
            background:var(--input-bg); padding:6px 12px; border-radius:8px; 
            font-family:'Monaco', monospace; color:var(--text-main); 
            border:1px solid var(--border); font-weight: bold; letter-spacing: 1px;
        }
        .progress-labels {
            display:flex; justify-content:space-between; font-size:10px; 
            font-weight:800; margin-bottom:8px; text-transform:uppercase;
        }
        .progress-track {
            width:100%; height:10px; background:rgba(255,255,255,0.05); 
            border-radius:10px; overflow:hidden; border: 1px solid rgba(255,255,255,0.05);
        }
        .progress-fill {
            height:100%; transition:width 1s cubic-bezier(0.175, 0.885, 0.32, 1.275), background-color 0.5s ease;
        }
        .grid-info-cliente {
            display:grid; grid-template-columns: 1fr 1fr; gap:12px; margin-top:25px; margin-bottom:25px;
        }
        .box-info {
            background:rgba(0,0,0,0.3); padding:16px; border-radius:12px; 
            border:1px solid var(--border); text-align:center;
            display: flex; flex-direction: column; justify-content: center;
        }
        .box-info small { color:var(--text-dim); font-size:10px; font-weight: 700; text-transform:uppercase; margin-bottom:6px; }
        .checklist-item {
            display:flex; align-items:center; gap:10px; margin-bottom:8px; 
            font-size:13px; background:rgba(255,255,255,0.02); padding:12px; 
            border-radius:8px; border:1px solid rgba(255,255,255,0.05);
            color: #cbd5e1; font-weight: 500;
        }
        .btn-aprovar {
            background: linear-gradient(135deg, var(--success) 0%, #059669 100%);
            color: #fff; box-shadow: 0 5px 20px rgba(16, 185, 129, 0.2);
        }
        .btn-outline-cliente {
            background: transparent; border: 1px solid var(--border); color: var(--text-main);
        }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> 
    INÍCIO
</a>
<div id="custom-alert"></div>

<div id="confirm-box" class="confirm-box">
    <div class="card">
        <h3 id="confirm-title" style="color:var(--danger); margin-bottom:10px;">CONFIRMAR?</h3>
        <p id="confirm-text" style="font-size:13px; color:var(--text-dim); margin-bottom:20px;">Esta ação não pode ser desfeita.</p>
        <button class="btn-main" id="btn-confirm-sim" style="background:var(--danger); color:#fff;">SIM, CONFIRMAR</button>
        <button class="btn-main" onclick="fecharConfirm()" style="background:#222; color:#fff; margin-top:10px">CANCELAR</button>
    </div>
</div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logo.jpg" class="logo-img" alt="Lima Car Logo"></div>
        
        <div id="area-busca">
            <label>E-mail de Cadastro</label>
            <input type="email" id="login-user" placeholder="exemplo@email.com" oninput="verificarUsuarioMecanico(this.value)">
            
            <label>Sua Senha</label>
            <input type="password" id="login-pass" placeholder="••••">
            
            <div id="wrapper-placa" class="hidden">
                <label>Placa do Veículo</label>
                <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1D23">
            </div>
            
            <button class="btn-main" onclick="gerenciarLogin()">ACESSAR SISTEMA</button>
        </div>
        <div id="resultado-cliente"></div>
    </section>

    <section id="view-painel" class="card hidden">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:25px; border-bottom: 1px solid var(--border); padding-bottom: 15px;">
            <h2 style="font-size:14px; color:var(--primary); font-weight:800;">PAINEL TÉCNICO</h2>
            <button onclick="fazerSair()" style="color:var(--danger); background:none; border:1px solid var(--danger); padding:6px 12px; border-radius:8px; font-size:10px; cursor:pointer; font-weight:bold;">SAIR</button>
        </div>

        <div class="painel-grid">
            <div class="painel-col">
                <label style="color:var(--success); margin-bottom:15px;">📩 Novas Solicitações</label>
                <div id="lista-solicitacoes"></div>
                
                <div style="display:flex; justify-content:space-between; align-items:center; margin-top:25px;">
                    <div class="categorias-filtro">
                        <button class="cat-btn active" onclick="filtrarTabela('Todos', this)">🚀 Todos</button>
                        <button class="cat-btn" onclick="filtrarTabela('Aguardando', this)">⌛ Fila</button>
                        <button class="cat-btn" onclick="filtrarTabela('Trabalhando', this)">🛠️ Oficina</button>
                        <button class="cat-btn" onclick="filtrarTabela('Pronto', this)">🏁 Prontos</button>
                    </div>
                </div>

                <div class="table-container">
                    <table id="corpo-tabela"></table>
                </div>
                
                <button class="btn-danger-outline" onclick="confirmarLimpezaGeral()">🗑️ LIMPAR TODOS OS CADASTROS</button>
            </div>

            <div class="painel-col hidden" id="coluna-formulario">
                <div id="wrapper-animado" style="padding:15px; border-radius:var(--radius); border:1px solid var(--border); background:rgba(255,255,255,0.01);">
                    
                    <div id="indicador-modo" class="badge-modo">MODO</div>

                    <button id="btn-whats-direto" class="btn-main whatsapp-float-btn" style="display:none;">
                        FALAR COM CLIENTE
                    </button>

                    <div id="relatorio-cliente-view" class="relatorio-cliente-box" style="display:none">
                        <b style="color:var(--primary); font-size:11px;">RELATO DO CLIENTE:</b><br>
                        <span id="txt-relato-cliente" style="font-size:13px;"></span>
                    </div>

                    <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px">
                        <div><label>Placa</label><input type="text" id="m-placa" readonly></div>
                        <div><label>Total (R$)</label><input type="text" id="m-preco" placeholder="0,00" oninput="mascaraMoeda(this)"></div>
                    </div>
                    
                    <div style="display:grid; grid-template-columns: 1.5fr 1fr; gap:10px">
                        <div><label>Modelo Veículo</label><input type="text" id="m-modelo" readonly></div>
                        <div><label>Ano</label><input type="text" id="m-ano" readonly></div>
                    </div>
                    
                    <input type="hidden" id="m-identificacao-interna">

                    <label>WhatsApp do Cliente</label>
                    <input type="text" id="m-zap" placeholder="Ex: 11999999999" oninput="toggleBtnWhats(this.value)">

                    <label>Fotos</label>
                    <label for="m-fotos-input" class="btn-upload-custom" id="label-upload">📸 ENVIAR FOTOS</label>
                    <input type="file" id="m-fotos-input" multiple onchange="previewImages()" style="display:none;">
                    <div id="preview-area" class="fotos-grid"></div>

                    <label style="margin-top:15px;">Status</label>
                    <div class="status-picker">
                        <div class="status-option active" data-status="Aguardando" onclick="setStatus(this)">Fila</div>
                        <div class="status-option" data-status="Trabalhando" onclick="setStatus(this)">Oficina</div>
                        <div class="status-option" data-status="Pronto" onclick="setStatus(this)">Liberado</div>
                    </div>

                    <label>Serviços Rápidos</label>
                    <div style="display:flex; flex-wrap:wrap; gap:6px; margin-bottom:12px;">
                        <span class="tag-servico" onclick="addServico('Revisão Geral')">+ Revisão</span>
                        <span class="tag-servico" onclick="addServico('Troca de Óleo e Filtros')">+ Óleo</span>
                        <span class="tag-servico" onclick="addServico('Diagnóstico via Scanner')">+ Scanner</span>
                        <span class="tag-servico" onclick="addServico('Verificação de Freios')">+ Freios</span>
                        <span class="tag-servico" onclick="addServico('Suspensão')">+ Suspensão</span>
                    </div>
          
                    <textarea id="m-obs" rows="4" placeholder="Detalhes técnicos (separe por | para criar itens no checklist do cliente)..."></textarea>
                    
                    <button class="btn-main" onclick="salvar()">✅ SALVAR REGISTRO</button>
                    <button class="btn-main" onclick="limparFormulario()" style="background:#111; color:#94a3b8; margin-top:10px">CANCELAR</button>
                </div>
            </div>
        </div>
    </section>
</div>

<div id="img-modal" onclick="this.style.display='none'">
    <img id="modal-view">
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    const LOGIN_ADM = "adm.limacar";
    const SENHA_ADM = "1234";
    const WHATSAPP_MECANICA = "5511999999999"; 
    
    let statusSelecionado = "Aguardando";
    let bancoDados = {}; let bancoSolicitacoes = {}; let fotosBase64 = [];
    let nomeClienteAtual = ""; let relatoClienteAtual = "";
    let acaoConfirmacao = null; 

    function sanitizarEmail(email) {
        return email.toLowerCase().trim().replace(/\./g, '_').replace(/@/g, '_at_');
    }

    function fazerSair() {
        location.reload();
    }

    function verificarUsuarioMecanico(valor) {
        const wrapperPlaca = document.getElementById('wrapper-placa');
        const loginLimpo = valor.trim().toLowerCase();
        if (loginLimpo === LOGIN_ADM || loginLimpo === "") {
            wrapperPlaca.classList.add('hidden');
        } else {
            wrapperPlaca.classList.remove('hidden');
        }
    }

    function gerenciarLogin() {
        const userDigitado = document.getElementById('login-user').value.trim().toLowerCase();
        const senhaDigitada = document.getElementById('login-pass').value.trim();
        
        if(userDigitado === LOGIN_ADM && senhaDigitada === SENHA_ADM) {
            irPara('view-painel');
        } else {
            consultarCarro();
        }
    }

    function consultarCarro() {
        const emailDigitado = document.getElementById('login-user').value.trim();
        const senhaDigitada = document.getElementById('login-pass').value.trim();
        const placaDigitada = document.getElementById('login-placa').value.trim().toUpperCase();
        const res = document.getElementById('resultado-cliente');
        
        if(!emailDigitado || !senhaDigitada || !placaDigitada) return showAlert("⚠️ PREENCHA TODOS OS CAMPOS");

        const emailChave = sanitizarEmail(emailDigitado);
        
        db.ref('veiculos/' + placaDigitada).once('value', (snapVeiculo) => {
            const v = snapVeiculo.val();
            
            if(v && v.identificacao === emailChave) {
                db.ref('usuarios/' + emailChave).once('value', (snapUser) => {
                    const dadosUsuario = snapUser.val();
                    
                    if(dadosUsuario && dadosUsuario.senha === senhaDigitada) {
                        document.getElementById('area-busca').classList.add('hidden');
                        
                        // LÓGICA DA BARRA DE PROGRESSO
                        let percentual = 33;
                        let corProgress = "var(--warning)";
                        if(v.status === 'Trabalhando') { percentual = 66; corProgress = "#3b82f6"; } // Azul
                        if(v.status === 'Pronto') { percentual = 100; corProgress = "var(--success)"; }
                        
                        // LÓGICA DA PRÓXIMA REVISÃO (MOCKUP ESTÁTICO)
                        let hoje = new Date();
                        hoje.setMonth(hoje.getMonth() + 6);
                        let dataProximaRevisao = hoje.toLocaleDateString('pt-BR');

                        // LÓGICA DO CHECKLIST (Lê o v.obs e quebra nos pipes "|")
                        let checklistHTML = "";
                        if(v.obs && v.obs.trim() !== "") {
                            let itens = v.obs.split('|');
                            checklistHTML = itens.map(item => `
                                <div class="checklist-item">
                                    <span style="color:var(--primary); font-size:16px;">✔️</span> 
                                    <span>${item.trim()}</span>
                                </div>
                            `).join('');
                        } else {
                            checklistHTML = `<div class="checklist-item" style="color:var(--text-dim);">Analisando o veículo e diagnosticando necessidades...</div>`;
                        }

                        // LÓGICA DE FOTOS
                        let galeriaHTML = "";
                        if(v.fotos) {
                            galeriaHTML = `
                                <label style="margin-top:20px;">Evidências do Serviço</label>
                                <div class="fotos-grid" style="margin-top:5px; margin-bottom:25px;">
                                    ${v.fotos.map(f => `<img src="${f}" class="img-item" onclick="zoomImg('${f}')">`).join('')}
                                </div>`;
                        }

                        // INJETANDO O NOVO HTML DA CENTRAL DO PROPRIETÁRIO
                        res.innerHTML = `
                            <div class="painel-proprietario">
                                <div class="header-veiculo">
                                    <h3>${v.modelo || 'Veículo Cadastrado'}</h3>
                                    <span class="placa-badge-cliente">${placaDigitada}</span>
                                </div>

                                <div style="margin-bottom: 10px;">
                                    <div class="progress-labels">
                                        <span style="color:${percentual >= 33 ? corProgress : 'var(--text-dim)'}">Na Fila</span>
                                        <span style="color:${percentual >= 66 ? corProgress : 'var(--text-dim)'}">Em Manutenção</span>
                                        <span style="color:${percentual === 100 ? corProgress : 'var(--text-dim)'}">Pronto</span>
                                    </div>
                                    <div class="progress-track">
                                        <div class="progress-fill" style="width: ${percentual}%; background-color: ${corProgress};"></div>
                                    </div>
                                </div>

                                <div class="grid-info-cliente">
                                    <div class="box-info">
                                        <small>Investimento Previsto</small>
                                        <b style="color:var(--success); font-size:20px; font-weight:900;">R$ ${v.preco || '0,00'}</b>
                                    </div>
                                    <div class="box-info">
                                        <small>Próxima Revisão</small>
                                        <b style="color:var(--primary); font-size:15px;">${dataProximaRevisao}</b>
                                    </div>
                                </div>

                                <label>Checklist de Manutenção</label>
                                ${checklistHTML}

                                ${galeriaHTML}

                                <div style="display:flex; flex-direction:column; gap:12px; margin-top:10px;">
                                    <a href="https://wa.me/${WHATSAPP_MECANICA}?text=Olá,%20sou%20${dadosUsuario.nome}%20e%20*APROVO*%20o%20orçamento%20de%20R$%20${v.preco}%20para%20a%20placa%20${placaDigitada}." target="_blank" class="btn-main btn-aprovar">
                                        ✅ APROVAR ORÇAMENTO
                                    </a>
                                    
                                    <a href="https://wa.me/${WHATSAPP_MECANICA}?text=Olá,%20sou%20${dadosUsuario.nome}%20e%20gostaria%20de%20tirar%20uma%20dúvida%20sobre%20meu%20veículo%20(Placa%20${placaDigitada})" target="_blank" class="btn-main btn-outline-cliente">
                                        💬 FALAR COM MECÂNICO
                                    </a>
                                    
                                    <button onclick="location.reload()" class="btn-main" style="background:transparent; border:none; color:var(--text-dim); box-shadow:none; font-size:11px; margin-top:0;">
                                        Sair da Central
                                    </button>
                                </div>
                            </div>`;
                    } else {
                        showAlert("❌ SENHA INCORRETA");
                    }
                });
            } else {
                showAlert("🔍 PLACA OU E-MAIL NÃO CONFEREM");
            }
        });
    }

    // --- FUNÇÕES DE ADMINISTRAÇÃO E LÓGICA (MANTIDAS) ---
    db.ref('veiculos').on('value', snap => { bancoDados = snap.val() || {}; desenharTabela(); });
    db.ref('servicos_ativos').on('value', snap => { bancoSolicitacoes = snap.val() || {}; desenharSolicitacoes(); });

    function desenharSolicitacoes() {
        const container = document.getElementById('lista-solicitacoes');
        container.innerHTML = "";
        Object.keys(bancoSolicitacoes).forEach(id => {
            const s = bancoSolicitacoes[id];
            container.innerHTML += `
                <div class="solicitacao-item">
                    <div class="solicitacao-header">
                        <div class="solicitacao-info">
                            <b>${s.modelo || 'Não Informado'}</b>
                            <span>Ano: ${s.ano || '---'}</span>
                        </div>
                        <div class="solicitacao-badge">${s.placa || 'S/P'}</div>
                    </div>
                    <div style="display:flex; gap:8px;">
                        <button class="btn-main" style="padding:8px; font-size:10px; flex:2;" onclick="importarSolicitacao('${id}')">ACEITAR</button>
                        <button class="btn-main" style="padding:8px; font-size:10px; flex:1; background:var(--danger); color:#fff;" onclick="confirmarRejeitarSolicitacao('${id}')">REJEITAR</button>
                    </div>
                </div>`;
        });
    }

    function abrirFormulario(modo) {
        const col = document.getElementById('coluna-formulario');
        const wrapper = document.getElementById('wrapper-animado');
        const indicador = document.getElementById('indicador-modo');
        col.classList.remove('hidden');
        wrapper.classList.remove('animar-entrada');
        void wrapper.offsetWidth; 
        wrapper.classList.add('animar-entrada');
        if(modo === 'novo') {
            indicador.innerText = "✨ MODO: NOVO CADASTRO";
            indicador.className = "badge-modo modo-novo";
        } else {
            indicador.innerText = "✏️ MODO: EDIÇÃO DE REGISTRO";
            indicador.className = "badge-modo modo-edicao";
        }
    }

    function importarSolicitacao(id) {
        const s = bancoSolicitacoes[id];
        document.getElementById('m-placa').value = s.placa || "";
        document.getElementById('m-modelo').value = s.modelo || "";
        document.getElementById('m-ano').value = s.ano || "";
        document.getElementById('m-identificacao-interna').value = s.cliente_id || "";
        document.getElementById('m-zap').value = s.zap_cliente || "";
        toggleBtnWhats(s.zap_cliente || "");
        nomeClienteAtual = s.nome_cliente || "Cliente";
        relatoClienteAtual = s.problema || "Não informado";
        exibirRelatoCliente(nomeClienteAtual, relatoClienteAtual);
        abrirFormulario('novo');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function prepararEdicao(p) {
        const v = bancoDados[p];
        document.getElementById('m-placa').value = p;
        document.getElementById('m-modelo').value = v.modelo || "";
        document.getElementById('m-ano').value = v.ano || "";
        document.getElementById('m-preco').value = v.preco || "0,00";
        document.getElementById('m-obs').value = v.obs || "";
        document.getElementById('m-identificacao-interna').value = v.identificacao || ""; 
        fotosBase64 = v.fotos || [];
        renderizarFotosEdicao();
        document.getElementById('m-zap').value = v.clienteZap || "";
        toggleBtnWhats(v.clienteZap || "");
        nomeClienteAtual = v.clienteNome || "Cliente";
        relatoClienteAtual = v.clienteRelato || "Histórico de oficina";
        exibirRelatoCliente(nomeClienteAtual, relatoClienteAtual);
        abrirFormulario('editar');
        window.scrollTo({top: 0, behavior: 'smooth'});
    }

    function salvar() {
        const placa = document.getElementById('m-placa').value.toUpperCase();
        if(!placa) return showAlert("⚠️ PLACA OBRIGATÓRIA");

        const dados = { 
            modelo: document.getElementById('m-modelo').value, 
            ano: document.getElementById('m-ano').value,
            status: statusSelecionado, 
            preco: document.getElementById('m-preco').value || "0,00", 
            obs: document.getElementById('m-obs').value, 
            fotos: fotosBase64, 
            clienteZap: document.getElementById('m-zap').value.replace(/\D/g, ""), 
            clienteNome: nomeClienteAtual,
            clienteRelato: relatoClienteAtual,
            identificacao: document.getElementById('m-identificacao-interna').value 
        };

        db.ref('veiculos/' + placa).set(dados).then(() => {
            db.ref('servicos_ativos/' + placa).remove();
            showAlert("✔️ REGISTRO ATUALIZADO");
            limparFormulario();
        });
    }

    function limparFormulario() {
        document.getElementById('coluna-formulario').classList.add('hidden');
        ['m-placa','m-modelo','m-ano','m-preco','m-obs','m-identificacao-interna','m-zap'].forEach(id => {
            const el = document.getElementById(id);
            if(el) el.value = "";
        });
        fotosBase64 = [];
        document.getElementById('preview-area').innerHTML = "";
        document.getElementById('relatorio-cliente-view').style.display = "none";
        toggleBtnWhats(""); 
    }

    function desenharTabela(filtro = "Todos") {
        const corpo = document.getElementById('corpo-tabela');
        corpo.innerHTML = "";
        const chaves = Object.keys(bancoDados).reverse();
        
        if(chaves.length === 0) {
            corpo.innerHTML = "<tr><td colspan='3' style='text-align:center; color:var(--text-dim)'>Nenhum veículo em pátio</td></tr>";
            return;
        }

        chaves.forEach(p => {
            const v = bancoDados[p];
            if(filtro !== "Todos" && v.status !== filtro) return;
            corpo.innerHTML += `
                <tr>
                    <td><b>${p}</b><br><small style="color:var(--text-dim)">${v.modelo || 'S/M'} ${v.ano || ''}</small></td>
                    <td><span style="color:${v.status === 'Pronto' ? 'var(--success)' : 'var(--warning)'}">${v.status}</span></td>
                    <td style="text-align:right">
                        <button onclick="prepararEdicao('${p}')" style="background:none; border:none; cursor:pointer; font-size:18px;">✏️</button>
                        <button onclick="confirmarExcluir('${p}')" style="background:none; border:none; cursor:pointer; margin-left:10px; font-size:18px;">🗑️</button>
                    </td>
                </tr>`;
        });
    }

    function toggleBtnWhats(zap) {
        const btn = document.getElementById('btn-whats-direto');
        const numeroLimpo = zap ? zap.replace(/\D/g, "") : "";
        if(numeroLimpo.length >= 10) {
            btn.style.display = "flex"; 
            btn.onclick = () => { window.open(`https://wa.me/55${numeroLimpo}`, '_blank'); };
        } else { btn.style.display = "none"; }
    }

    function exibirRelatoCliente(nome, problema) {
        const box = document.getElementById('relatorio-cliente-view');
        if(nome && problema && problema !== "Não informado" && problema !== "Histórico de oficina") {
            box.style.display = "block"; 
            document.getElementById('txt-relato-cliente').innerText = `Cliente: ${nome}\nRelato: ${problema}`;
        } else { box.style.display = "none"; }
    }

    function renderizarFotosEdicao() {
        const area = document.getElementById('preview-area');
        area.innerHTML = "";
        fotosBase64.forEach((src, idx) => {
            area.innerHTML += `
                <div style="position:relative">
                    <img src="${src}" class="img-item" onclick="zoomImg('${src}')">
                    <button onclick="event.stopPropagation(); fotosBase64.splice(${idx},1); renderizarFotosEdicao()" 
                        style="position:absolute; top:-5px; right:-5px; background:var(--danger); color:white; border:none; border-radius:50%; width:22px; height:22px; cursor:pointer; font-weight:bold;">×</button>
                </div>`;
        });
    }

    function zoomImg(src) {
        const modal = document.getElementById('img-modal');
        const view = document.getElementById('modal-view');
        view.src = src;
        modal.style.display = 'flex';
    }

    function previewImages() {
        const files = document.getElementById('m-fotos-input').files;
        Array.from(files).forEach(file => {
            const reader = new FileReader();
            reader.onload = (e) => { fotosBase64.push(e.target.result); renderizarFotosEdicao(); };
            reader.readAsDataURL(file);
        });
    }

    function addServico(t) { 
        const c = document.getElementById('m-obs'); 
        c.value += (c.value ? " | " : "") + t; 
    }

    function showAlert(m) { 
        const d = document.getElementById('custom-alert'); 
        d.innerText = m; 
        d.style.display = 'block'; 
        setTimeout(() => d.style.display='none', 2500); 
    }

    function mascaraMoeda(i) { 
        let v = i.value.replace(/\D/g,''); 
        v = (v/100).toFixed(2).replace(".",","); 
        i.value = v; 
    }

    function irPara(id) { 
        document.querySelectorAll('section').forEach(s => s.classList.add('hidden')); 
        document.getElementById(id).classList.remove('hidden'); 
    }

    function setStatus(el) { 
        document.querySelectorAll('.status-option').forEach(opt => opt.classList.remove('active')); 
        el.classList.add('active'); 
        statusSelecionado = el.getAttribute('data-status'); 
    }

    function fecharConfirm() { document.getElementById('confirm-box').style.display = 'none'; acaoConfirmacao = null; }

    function filtrarTabela(f, btn) { 
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active')); 
        btn.classList.add('active'); 
        desenharTabela(f); 
    }

    function confirmarExcluir(p) { 
        document.getElementById('confirm-title').innerText = "EXCLUIR VEÍCULO?";
        document.getElementById('confirm-text').innerText = "A placa " + p + " será removida permanentemente.";
        document.getElementById('confirm-box').style.display = 'flex'; 
        acaoConfirmacao = () => { db.ref('veiculos/' + p).remove().then(() => { fecharConfirm(); showAlert("🗑️ REMOVIDO"); }); };
    }

    function confirmarRejeitarSolicitacao(id) {
        document.getElementById('confirm-title').innerText = "REJEITAR PEDIDO?";
        document.getElementById('confirm-text').innerText = "Esta solicitação será apagada da fila.";
        document.getElementById('confirm-box').style.display = 'flex'; 
        acaoConfirmacao = () => { db.ref('servicos_ativos/' + id).remove().then(() => { fecharConfirm(); showAlert("🚫 REJEITADA"); }); };
    }

    function confirmarLimpezaGeral() {
        document.getElementById('confirm-title').innerText = "LIMPAR TUDO?";
        document.getElementById('confirm-text').innerText = "VOCÊ VAI APAGAR TODOS OS VEÍCULOS DO PÁTIO AGORA!";
        document.getElementById('confirm-box').style.display = 'flex'; 
        acaoConfirmacao = () => { db.ref('veiculos').remove().then(() => { fecharConfirm(); showAlert("💥 PÁTIO LIMPO!"); }); };
    }

    document.getElementById('btn-confirm-sim').onclick = () => { if(acaoConfirmacao) acaoConfirmacao(); };

    document.addEventListener('keydown', function(event) {
        if (event.key === 'Enter') {
            if (!document.getElementById('view-cliente').classList.contains('hidden')) {
                gerenciarLogin();
            } else if (!document.getElementById('coluna-formulario').classList.contains('hidden')) {
                salvar();
            }
            if (document.getElementById('confirm-box').style.display === 'flex') {
                if(acaoConfirmacao) acaoConfirmacao();
            }
        }
        
        if (event.key === 'Escape') {
            if (document.getElementById('img-modal').style.display === 'flex') {
                document.getElementById('img-modal').style.display = 'none';
            } else if (document.getElementById('confirm-box').style.display === 'flex') {
                fecharConfirm();
            } else if (!document.getElementById('coluna-formulario').classList.contains('hidden')) {
                limparFormulario();
            }
        }
    });
</script>
</body>
</html>
