
<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
    <title>Login - Mecânica Lima Car</title>
    <style>
        :root { 
            --bg: #0a0e17; --card-bg: rgba(255, 255, 255, 0.03);
            --primary: #29b6f6; --primary-alt: #8b5cf6; --primary-glow: rgba(41, 182, 246, 0.3);
            --text-main: #ffffff; --text-dim: #94a3b8; --border: rgba(41, 182, 246, 0.15); 
            --success: #10b981; --input-bg: #111827; --logo-size: 200px; --radius: 16px;
        } 
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; margin: 0; padding: 0; } 
        body { 
            font-family: 'Inter', sans-serif; background-color: var(--bg); 
            color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; padding: 10px; justify-content: center;
        }
        .container { width: 100%; max-width: 450px; margin: 0 auto; } 
        .card { 
            background: var(--card-bg); border: 1px solid var(--border); padding: 25px; 
            border-radius: var(--radius); backdrop-filter: blur(12px); box-shadow: 0 15px 35px rgba(0,0,0,0.4);
        } 
        .logo-box { text-align: center; margin-bottom: 30px; } 
        .logo-img { width: 100%; max-width: var(--logo-size); filter: drop-shadow(0 0 10px var(--primary-glow)); } 
        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; } 
        input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; } 
        .input-placa-grande { font-family: monospace; font-size: 32px !important; background: linear-gradient(to bottom, #fff, #cbd5e1) !important; color: #0f172a !important; text-transform: uppercase; letter-spacing: 4px; text-align: center; font-weight: 900; } 
        .btn-main { background: linear-gradient(135deg, var(--primary) 0%, var(--primary-alt) 100%); color: #fff; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; margin-top: 5px; } 
        .hidden { display: none !important; }
        .fotos-grid { display: grid; gap: 8px; margin-top: 15px; grid-template-columns: repeat(auto-fill, minmax(80px, 1fr)); } 
        .img-item { width: 100%; aspect-ratio: 1/1; object-fit: cover; border-radius: 10px; border: 1px solid var(--border); } 
        #custom-alert { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); z-index: 30000; padding: 15px 20px; border-radius: 10px; background: #1e293b; color: white; border-left: 4px solid var(--primary); display: none; width: 85%; text-align: center; }
        .whatsapp-float-btn { background: #128c7e; color: white; display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px; text-decoration: none; border-radius: 12px; font-weight: 700; margin-top: 20px; }
    </style>
</head>
<body>

<div id="custom-alert"></div>

<div class="container">
    <section id="view-cliente" class="card">
        <div class="logo-box"><img src="logomontes.png" class="logo-img"></div>
        <div id="area-busca">
            <label>E-mail de Cadastro</label>
            <input type="email" id="login-user" placeholder="exemplo@email.com" oninput="verificarUsuarioMecanico(this.value)">
            <label>Sua Senha</label>
            <input type="password" id="login-pass" placeholder="••••">
            <div id="wrapper-placa">
                <label>Placa do Veículo</label>
                <input type="text" id="login-placa" class="input-placa-grande" maxlength="7" placeholder="ABC1D23">
            </div>
            <button class="btn-main" onclick="gerenciarLogin()">VERIFICAR STATUS</button>
        </div>
        <div id="resultado-cliente"></div>
    </section>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function sanitizarEmail(email) { return email.toLowerCase().trim().replace(/\./g, '_').replace(/@/g, '_at_'); }

    function gerenciarLogin() {
        const emailDigitado = document.getElementById('login-user').value.trim();
        const senhaDigitada = document.getElementById('login-pass').value.trim();
        const placaDigitada = document.getElementById('login-placa').value.trim().toUpperCase();
        const res = document.getElementById('resultado-cliente');
        
        if(!emailDigitado || !senhaDigitada || !placaDigitada) return showAlert("⚠️ PREENCHA TUDO");

        const emailChave = sanitizarEmail(emailDigitado);
        
        db.ref('veiculos/' + placaDigitada).once('value', (snapVeiculo) => {
            const v = snapVeiculo.val();
            if(v && v.identificacao === emailChave) {
                db.ref('usuarios/' + emailChave).once('value', (snapUser) => {
                    const dadosUsuario = snapUser.val();
                    if(dadosUsuario && dadosUsuario.senha === senhaDigitada) {
                         res.innerHTML = `
                            <div style="margin-top:20px; background:rgba(255,255,255,0.05); padding:20px; border-radius:16px; border:1px solid var(--border);">
                                <h3 style="color:var(--primary);">${v.modelo || 'Veículo'}</h3>
                                <p>Status: <b style="color:var(--primary); font-size:18px;">${v.status}</b></p>
                                <div style="margin:15px 0; color:#cbd5e1; font-size:13px; background:rgba(0,0,0,0.2); padding:10px; border-radius:8px;">
                                    <b>Nota Técnica:</b><br>${v.obs || 'Analisando...'}
                                </div>
                                <p style="color:var(--success); font-weight:900; font-size:24px">R$ ${v.preco || '0,00'}</p>
                                <a href="https://wa.me/5511999999999" class="whatsapp-float-btn">💬 FALAR COM O MECÂNICO</a>
                            </div>`;
                        document.getElementById('area-busca').classList.add('hidden');
                    } else { showAlert("❌ SENHA INCORRETA"); }
                });
            } else { showAlert("🔍 DADOS NÃO CONFEREM"); }
        });
    }

    function showAlert(m) { 
        const d = document.getElementById('custom-alert'); 
        d.innerText = m; d.style.display = 'block'; 
        setTimeout(() => d.style.display='none', 2500); 
    }
</script>
</body>
</html>
