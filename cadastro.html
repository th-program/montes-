<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mecânica Lima Car | Cadastro</title>
    <style>
        /* [O MESMO CSS DO ARQUIVO ANTERIOR] */
        :root { --bg: #0f121e; --card-bg: rgba(255, 255, 255, 0.03); --primary: #2eb4f0; --primary-glow: rgba(46, 180, 240, 0.3); --text-main: #f8f9fa; --text-dim: #94a3b8; --border: rgba(46, 180, 240, 0.15); --input-bg: #141824; --radius: 16px; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text-main); display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px; }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); backdrop-filter: blur(12px); width: 100%; max-width: 400px; box-shadow: 0 15px 35px rgba(0,0,0,0.4); }
        .logo-img { width: 150px; display: block; margin: 0 auto 20px; filter: drop-shadow(0 0 10px var(--primary-glow)); }
        label { display: block; font-size: 10px; color: var(--primary); margin-bottom: 6px; font-weight: 700; text-transform: uppercase; letter-spacing: 1px; }
        input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: #fff; font-size: 16px; margin-bottom: 15px; }
        .btn-main { background: linear-gradient(135deg, #2eb4f0 0%, #8238ed 100%); color: #fff; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; text-transform: uppercase; cursor: pointer; }
        .btn-home-fixed { position: fixed; top: 20px; left: 20px; text-decoration: none; color: var(--text-dim); font-size: 12px; font-weight: 600; display: flex; align-items: center; gap: 5px; }
        .svg-icon { width: 1.2em; height: 1.2em; fill: currentColor; }
        #custom-alert { position: fixed; top: 20px; z-index: 9999; padding: 15px; border-radius: 10px; color: white; display: none; width: 90%; max-width: 400px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<a href="index.html" class="btn-home-fixed">
    <svg class="svg-icon" viewBox="0 0 24 24"><path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg> INÍCIO
</a>

<div id="custom-alert"></div>

<div class="card">
    <img src="logomontes.png" class="logo-img">
    <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:20px;">CRIAR CONTA</h2>
    
    <label>Nome Completo</label>
    <input type="text" id="c-nome" placeholder="Ex: João Silva">
    <label>WhatsApp</label>
    <input type="tel" id="c-zap" placeholder="11999999999">
    <label>E-mail</label>
    <input type="email" id="c-email" placeholder="seu@email.com">
    <label>Senha</label>
    <input type="password" id="c-pass" placeholder="••••••">
    
    <button class="btn-main" onclick="registrarUsuario()">FINALIZAR CADASTRO</button>
    <p style="text-align:center; margin-top:20px; font-size:13px; color:var(--text-dim);">Já tem conta? <a href="login.html" style="color:var(--primary); font-weight:bold; text-decoration:none;">Ir para Login</a></p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    // Configuração Firebase
    const firebaseConfig = {
        apiKey: "COLE_AQUI",
        authDomain: "a-fonte-43744.firebaseapp.com",
        databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com",
        projectId: "a-fonte-43744",
        storageBucket: "a-fonte-43744.appspot.com",
    };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showAlert(msg, color = "#ef4444") {
        const div = document.getElementById('custom-alert');
        div.style.background = "#141824";
        div.style.borderLeft = `4px solid ${color}`;
        div.innerText = msg;
        div.style.display = 'block';
        setTimeout(() => { div.style.display = 'none'; }, 3000);
    }

    function registrarUsuario() {
        const nome = document.getElementById('c-nome').value.trim();
        const zap = document.getElementById('c-zap').value.trim();
        const email = document.getElementById('c-email').value.trim().toLowerCase();
        const pass = document.getElementById('c-pass').value.trim();
        const chave = email.replace(/\./g, '_').replace(/@/g, '_at_');

        if(!nome || !email || !pass) return showAlert("Preencha todos os campos obrigatórios");

        db.ref('usuarios/' + chave).once('value').then(snap => {
            if(snap.exists()){
                showAlert("Este e-mail já está cadastrado.");
            } else {
                db.ref('usuarios/' + chave).set({ nome, zap, email, senha: pass })
                .then(() => {
                    showAlert("Conta criada com sucesso!", "#10b981");
                    setTimeout(() => { window.location.href = 'login.html'; }, 2000);
                });
            }
        });
    }
</script>
</body>
</html>
