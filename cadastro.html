<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro | Mecânica Lima Car</title>
    <style>
        :root { 
            --bg: #0f121e; --card-bg: rgba(255, 255, 255, 0.03); --primary: #2eb4f0; 
            --text-main: #f8f9fa; --text-dim: #94a3b8; --border: rgba(46, 180, 240, 0.15); 
            --input-bg: #141824; --radius: 16px;
        } 
        body { 
            font-family: sans-serif; background: var(--bg); color: var(--text-main); 
            display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 20px;
        }
        .card { background: var(--card-bg); border: 1px solid var(--border); padding: 30px; border-radius: var(--radius); width: 100%; max-width: 400px; }
        label { display: block; font-size: 10px; color: var(--primary); font-weight: 700; margin-bottom: 5px; }
        input { width: 100%; padding: 14px; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; color: #fff; margin-bottom: 15px; }
        .btn-main { background: linear-gradient(135deg, #2eb4f0, #8238ed); color: #fff; width: 100%; padding: 16px; border: none; border-radius: 12px; font-weight: 800; cursor: pointer; }
        .toggle-mode { text-align: center; margin-top: 20px; font-size: 13px; color: var(--text-dim); }
        #alert { padding: 15px; border-radius: 10px; display: none; margin-bottom: 15px; text-align: center; font-size: 12px; }
    </style>
</head>
<body>

<div class="card">
    <div style="text-align:center; margin-bottom:20px"><img src="logomontes.png" style="width:120px"></div>
    <h2 style="color:var(--primary); font-size:18px; text-align:center; margin-bottom:20px;">CRIAR CONTA</h2>
    
    <div id="alert"></div>

    <label>Nome Completo</label>
    <input type="text" id="c-nome" placeholder="João Silva">
    
    <label>WhatsApp</label>
    <input type="tel" id="c-zap" placeholder="11999999999">

    <label>E-mail</label>
    <input type="email" id="c-email" placeholder="seu@email.com">

    <label>Senha</label>
    <input type="password" id="c-pass" placeholder="••••••">
    
    <button class="btn-main" onclick="fazerCadastro()">FINALIZAR CADASTRO</button>

    <div class="toggle-mode">
        Já tem conta? <a href="login.html" style="color:var(--primary)">Ir para Login</a>
    </div>
</div>

<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.17.1/firebase-database-compat.js"></script>
<script>
    const firebaseConfig = { apiKey: "COLE_AQUI", authDomain: "a-fonte-43744.firebaseapp.com", databaseURL: "https://a-fonte-43744-default-rtdb.firebaseio.com", projectId: "a-fonte-43744", storageBucket: "a-fonte-43744.appspot.com" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function fazerCadastro() {
        const nome = document.getElementById('c-nome').value.trim();
        const zap = document.getElementById('c-zap').value.replace(/\D/g, "");
        const email = document.getElementById('c-email').value.trim().toLowerCase();
        const pass = document.getElementById('c-pass').value.trim();
        const alertDiv = document.getElementById('alert');

        if(!nome || !zap || !email || !pass) {
            alertDiv.style.display = 'block'; alertDiv.style.background = '#ef444433'; alertDiv.innerText = "Preencha todos os campos";
            return;
        }

        const chave = email.replace(/\./g, '_').replace(/@/g, '_at_');
        
        db.ref('usuarios/' + chave).once('value').then(snap => {
            if(snap.exists()) {
                alertDiv.style.display = 'block'; alertDiv.innerText = "E-mail já cadastrado";
            } else {
                db.ref('usuarios/' + chave).set({ nome, zap, email, senha: pass }).then(() => {
                    alertDiv.style.display = 'block'; alertDiv.style.background = '#10b98133'; alertDiv.innerText = "Conta criada! Redirecionando...";
                    setTimeout(() => { window.location.href = "login.html"; }, 2000);
                });
            }
        });
    }
</script>
</body>
</html>
